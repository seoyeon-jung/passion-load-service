paths:
  /api/v1/passion-load/submissions:
    post:
      tags: [submissions]
      summary: 제출 업서트
      description: |
        - 권한: TEACHER/ADMIN
      security:
        - org: []
        - role: []
        - user: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./components.yaml#/components/schemas/UpsertSubmissionDto
      responses:
        "201":
          description: Upserted submission
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden
        "400":
          $ref: ./components.yaml#/components/responses/BadRequest

    get:
      tags: [submissions]
      summary: 제출 목록 조회
      description: |
        - filters: assignmentId | studentId | date
        - 최소 1개 필터 필요 (없으면 400)
      security:
        - org: []
        - role: []
        - user: []
      parameters:
        - name: assignmentId
          in: query
          required: false
          schema: { type: string, example: a09a4529-5e30-49b7-80c4-142313d8a2df }
        - name: studentId
          in: query
          required: false
          schema: { type: string, example: LMS_STUDENT_0001 }
        - name: date
          in: query
          required: false
          description: yyyy-mm-dd
          schema: { type: string, example: 2026-02-16 }
      responses:
        "200":
          description: Submission list
        "400":
          $ref: ./components.yaml#/components/responses/BadRequest
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden