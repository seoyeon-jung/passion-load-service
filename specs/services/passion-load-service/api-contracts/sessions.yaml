paths:
  /api/v1/passion-load/sessions:
    post:
      tags: [sessions]
      summary: 세션 생성
      description: |
        - 권한: TEACHER/ADMIN
        - date는 yyyy-mm-dd 형식
      security:
        - org: []
        - role: []
        - user: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./components.yaml#/components/schemas/CreateSessionDto
      responses:
        "201":
          description: 생성된 세션
          content:
            application/json:
              schema:
                $ref: ./components.yaml#/components/schemas/SessionResponseDto
        "400":
          $ref: ./components.yaml#/components/responses/BadRequest
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden

    get:
      tags: [sessions]
      summary: 세션 목록 조회(org 범위)
      security:
        - org: []
        - role: []
        - user: []
      responses:
        "200":
          description: 세션 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ./components.yaml#/components/schemas/SessionResponseDto
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden

  /api/v1/passion-load/sessions/{id}:
    get:
      tags: [sessions]
      summary: 세션 단건 조회
      security:
        - org: []
        - role: []
        - user: []
      parameters:
        - name: id
          in: path
          required: true
          description: Session UUID
          schema:
            type: string
      responses:
        "200":
          description: 세션
          content:
            application/json:
              schema:
                $ref: ./components.yaml#/components/schemas/SessionResponseDto
        "400":
          $ref: ./components.yaml#/components/responses/BadRequest
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden
        "404":
          $ref: ./components.yaml#/components/responses/NotFound

    patch:
      tags: [sessions]
      summary: 세션 수정(title/date)
      description: |
        - 권한: TEACHER/ADMIN
        - date는 yyyy-mm-dd 형식
      security:
        - org: []
        - role: []
        - user: []
      parameters:
        - name: id
          in: path
          required: true
          description: Session UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./components.yaml#/components/schemas/UpdateSessionDto
      responses:
        "200":
          description: 수정된 세션
          content:
            application/json:
              schema:
                $ref: ./components.yaml#/components/schemas/SessionResponseDto
        "400":
          $ref: ./components.yaml#/components/responses/BadRequest
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden
        "404":
          $ref: ./components.yaml#/components/responses/NotFound

  /api/v1/passion-load/sessions/{id}/status:
    patch:
      tags: [sessions]
      summary: 세션 상태 변경
      description: |
        - 권한: TEACHER/ADMIN
        - 상태 전이 규칙: PLANNED -> ACTIVE -> DONE
      security:
        - org: []
        - role: []
        - user: []
      parameters:
        - name: id
          in: path
          required: true
          description: Session UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./components.yaml#/components/schemas/UpdateSessionStatusDto
      responses:
        "200":
          description: 수정된 세션
          content:
            application/json:
              schema:
                $ref: ./components.yaml#/components/schemas/SessionResponseDto
        "400":
          $ref: ./components.yaml#/components/responses/BadRequest
        "403":
          $ref: ./components.yaml#/components/responses/Forbidden
        "404":
          $ref: ./components.yaml#/components/responses/NotFound